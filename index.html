<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기업 재무제표</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }

    /* 탭 버튼 */
    .tabs { display: flex; gap: 8px; margin-bottom: 0; }
    .tab-btn {
      padding: 10px 24px;
      border: 1px solid #ddd;
      border-bottom: none;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      font-size: 15px;
      color: #555;
    }
    .tab-btn.active {
      background: #2c3e50;
      color: white;
      font-weight: bold;
    }

    /* 탭 콘텐츠 */
    .tab-content { display: none; border: 1px solid #ddd; border-radius: 0 6px 6px 6px; padding: 20px; }
    .tab-content.active { display: block; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: right; }
    th:first-child, td:first-child { text-align: left; min-width: 200px; }
    th { background: #2c3e50; color: white; }
    tr:nth-child(even) { background: #f5f5f5; }
    tr:hover { background: #eaf0fb; }

    .loading { color: #888; }
  </style>
</head>
<body>
  <h1>📊 기업 재무제표</h1>

  <!-- 탭 버튼 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab(0)">재무상태표</button>
    <button class="tab-btn" onclick="showTab(1)">손익계산서</button>
    <button class="tab-btn" onclick="showTab(2)">현금흐름표</button>
  </div>

  <!-- 탭 콘텐츠 -->
  <div class="tab-content active" id="tab-0"><p class="loading">불러오는 중...</p></div>
  <div class="tab-content" id="tab-1"><p class="loading">불러오는 중...</p></div>
  <div class="tab-content" id="tab-2"><p class="loading">불러오는 중...</p></div>

  <script>
    // ── CSV 파일 목록 설정 ──────────────────────────────
    const FILES = [
      { label: '재무상태표', path: 'data/balance_sheet.csv' },
      { label: '손익계산서', path: 'data/income_statement.csv' },
      { label: '현금흐름표', path: 'data/cash_flow.csv' },
    ];
    // ────────────────────────────────────────────────────

    // CSV → HTML 테이블 변환
    function csvToTable(csv) {
      const rows = csv.trim().split('\n').map(r => r.split(','));
      const headers = rows[0];
      let html = '<table><thead><tr>';
      headers.forEach(h => html += `<th>${h.trim()}</th>`);
      html += '</tr></thead><tbody>';
      rows.slice(1).forEach(row => {
        html += '<tr>';
        row.forEach((cell, i) => {
          const trimmed = cell.trim();
          const val = i === 0
            ? trimmed
            : (trimmed === '' || trimmed === 'NA' || trimmed === '<NA>'
                ? '-'
                : Number(trimmed).toLocaleString());
          html += `<td>${val}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    // 탭 전환
    function showTab(index) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.tab-content').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    // 모든 CSV 병렬 로드
    FILES.forEach((file, i) => {
      fetch(file.path)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(csv => {
          document.getElementById(`tab-${i}`).innerHTML = csvToTable(csv);
        })
        .catch(() => {
          document.getElementById(`tab-${i}`).innerHTML =
            `❌ <b>${file.path}</b> 파일을 불러오지 못했습니다.`;
        });
    });
  </script>
</body>
</html>
